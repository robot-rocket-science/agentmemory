name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen --all-groups
      - run: uv run pytest tests/ --tb=short -q
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
