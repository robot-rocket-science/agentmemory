  <text x="560" y="290" text-anchor="middle" class="t-desc">provenance, typed edges,</text>
  <text x="560" y="302" text-anchor="middle" class="t-desc">supersession tracking</text>
  
  <rect x="15" y="365" width="750" height="230" rx="3" fill="rgba(0,100,0,0.04)" stroke="#1a6a1a" stroke-width="1"/>
