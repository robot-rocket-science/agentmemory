<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 780 730" xmlns="http://www.w3.org/2000/svg" style="max-width:780px;width:100%;height:auto;display:block;margin:2rem auto;">
  <defs>
    <marker id="ag" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7" fill="#33aa33"/></marker>
    <marker id="aa" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7" fill="#cc8800"/></marker>
    <marker id="ac" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7" fill="#339999"/></marker>
    <filter id="glow-g"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-a"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-c"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
<rect width="780" height="730" fill="#000"/>
  <style>
    .t-head { font: bold 13px 'Menlo','DejaVu Sans Mono',monospace; letter-spacing: 2px; }
    .t-mod { font: bold 11px 'Menlo','DejaVu Sans Mono',monospace; }
    .t-desc { font: 9.5px 'Menlo','DejaVu Sans Mono',monospace; fill: #1a6a1a; }
    .t-phase { font: bold 10px 'Menlo','DejaVu Sans Mono',monospace; letter-spacing: 3px; }
    .t-actor { font: bold 14px 'Menlo','DejaVu Sans Mono',monospace; }
    .arrow-g { stroke: #33aa33; stroke-width: 2; fill: none; marker-end: url(#ag); }
    .arrow-a { stroke: #cc8800; stroke-width: 2; fill: none; marker-end: url(#aa); }
    .arrow-c { stroke: #339999; stroke-width: 2; fill: none; marker-end: url(#ac); }
    .arrow-fb { stroke: #cc8800; stroke-width: 2; fill: none; stroke-dasharray: 8,5; marker-end: url(#aa); }
  </style>
  
  
  <rect x="30" y="20" width="120" height="44" rx="4" fill="none" stroke="#339999" stroke-width="2" filter="url(#glow-c)"/>
  <text x="90" y="47" text-anchor="middle" class="t-actor" fill="#339999">USER</text>
  
  <rect x="630" y="20" width="120" height="44" rx="4" fill="none" stroke="#cc8800" stroke-width="2" filter="url(#glow-a)"/>
  <text x="690" y="47" text-anchor="middle" class="t-actor" fill="#cc8800">LLM</text>
  
  <line x1="90" y1="64" x2="90" y2="105" class="arrow-c"/>
  <line x1="690" y1="64" x2="690" y2="105" class="arrow-a"/>
  
