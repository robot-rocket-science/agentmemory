  <text x="390" y="402" text-anchor="middle" class="t-desc">on retrieval request</text>
  
  <line x1="560" y1="319" x2="560" y2="365" style="stroke:#1a6a1a;stroke-width:1;stroke-dasharray:3,3"/>
  <line x1="560" y1="365" x2="160" y2="420" style="stroke:#33aa33;stroke-width:1.5;fill:none;marker-end:url(#ag)"/>
  
  <rect x="60" y="420" width="200" height="56" rx="4" fill="none" stroke="#33aa33" stroke-width="1.5"/>
  <text x="160" y="444" text-anchor="middle" class="t-mod" fill="#33aa33">Keyword Retrieval</text>
  <text x="160" y="466" text-anchor="middle" class="t-desc">grep-based, covers 69%</text>
  
  <line x1="260" y1="448" x2="310" y2="448" class="arrow-g"/>
  
  <rect x="310" y="420" width="200" height="56" rx="28" fill="none" stroke="#339999" stroke-width="1.5"/>
  <text x="410" y="444" text-anchor="middle" class="t-mod" fill="#339999">Gap Recovery</text>
  <text x="410" y="466" text-anchor="middle" class="t-desc">graph traversal, covers 31%</text>
  
  <line x1="510" y1="448" x2="540" y2="448" class="arrow-g"/>
  
  <polygon points="640,420 720,448 640,476 560,448" fill="none" stroke="#cc8800" stroke-width="1.5" filter="url(#glow-a)"/>
  <text x="640" y="445" text-anchor="middle" class="t-mod" fill="#cc8800">Inject</text>
  <text x="640" y="458" text-anchor="middle" style="font:8.5px 'Menlo',monospace;fill:#1a6a1a">rank + enforce</text>
  
  <text x="340" y="502" text-anchor="middle" class="t-desc">69% + 31% = 100% directive coverage</text>
  
  <line x1="720" y1="448" x2="745" y2="448" style="stroke:#cc8800;stroke-width:2;fill:none"/>
  <path d="M745,448 L745,47 L750,47" class="arrow-a"/>
  <text x="752" y="250" class="t-desc" fill="#cc8800" transform="rotate(90,752,250)">to LLM context</text>
  
  <rect x="15" y="530" width="750" height="190" rx="3" fill="rgba(150,100,0,0.04)" stroke="#1a6a1a" stroke-width="1"/>
  <text x="390" y="553" text-anchor="middle" class="t-phase" fill="#1a6a1a">FEEDBACK PATH</text>
  <text x="390" y="567" text-anchor="middle" class="t-desc">after LLM responds</text>
  
  <path d="M690,64 Q690,80 710,80 L760,80 L760,590 L660,590" class="arrow-a" style="stroke-dasharray:6,4"/>
  
  <rect x="440" y="580" width="220" height="56" rx="28" fill="none" stroke="#339999" stroke-width="1.5"/>
  <text x="550" y="604" text-anchor="middle" class="t-mod" fill="#339999">Confidence Tracker</text>
  <text x="550" y="624" text-anchor="middle" class="t-desc">did this help, hurt, or nothing?</text>
  
  <line x1="440" y1="608" x2="380" y2="608" class="arrow-g"/>
  
  <rect x="160" y="580" width="220" height="56" rx="4" fill="none" stroke="#33aa33" stroke-width="1.5" filter="url(#glow-g)"/>
  <text x="270" y="604" text-anchor="middle" class="t-mod" fill="#33aa33">Feedback Loop</text>
  <text x="270" y="624" text-anchor="middle" class="t-desc">update scores, decay unused</text>
  
  <path d="M160,608 L40,608 L40,270 L80,270" class="arrow-fb"/>
  <text x="28" y="440" class="t-desc" fill="#cc8800" transform="rotate(-90,28,440)">feedback updates storage</text>
  
  </svg>