  <text x="200" y="282" text-anchor="middle" style="font:8.5px 'Menlo',monospace;fill:#1a6a1a">filter junk, classify type</text>
  
  <line x1="280" y1="270" x2="440" y2="270" class="arrow-g"/>
  
  <ellipse cx="560" cy="245" rx="100" ry="14" fill="none" stroke="#33aa33" stroke-width="1.5"/>
