<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1100" font-family="'Menlo','DejaVu Sans Mono','Consolas',monospace">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-amber">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#ffcc00" flood-opacity="0.15" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cc8800"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffcc00"/>
    </marker>
  </defs>

  <rect width="900" height="1100" fill="#0a0a0e"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#ffcc00" font-size="16" font-weight="bold" letter-spacing="4" filter="url(#glow-amber)">SYSTEM ARCHITECTURE</text>
  <line x1="140" y1="55" x2="760" y2="55" stroke="#7a6b52" stroke-width="0.5"/>

  <!-- Column headers -->
  <text x="155" y="85" text-anchor="middle" fill="#cc8800" font-size="14" letter-spacing="3">INGESTION</text>
  <text x="450" y="85" text-anchor="middle" fill="#cc8800" font-size="14" letter-spacing="3">RETRIEVAL</text>
  <text x="745" y="85" text-anchor="middle" fill="#cc8800" font-size="14" letter-spacing="3">FEEDBACK</text>

  <!-- Column dividers -->
  <line x1="305" y1="70" x2="305" y2="1050" stroke="#7a6b52" stroke-width="0.5" stroke-dasharray="4,8"/>
  <line x1="595" y1="70" x2="595" y2="1050" stroke="#7a6b52" stroke-width="0.5" stroke-dasharray="4,8"/>

  <!-- ============ INGESTION COLUMN ============ -->

  <!-- Conversation Turn -->
  <rect x="30" y="110" width="250" height="44" rx="3" fill="none" stroke="#ffcc00" stroke-width="1.5"/>
  <text x="155" y="138" text-anchor="middle" fill="#ffcc00" font-size="13">Conversation Turn</text>

  <line x1="155" y1="154" x2="155" y2="180" stroke="#cc8800" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Sentence Extraction -->
  <rect x="30" y="185" width="250" height="60" rx="3" fill="rgba(204,136,0,0.08)" stroke="#7a6b52" stroke-width="1"/>
  <text x="155" y="212" text-anchor="middle" fill="#e8d4b0" font-size="13">Sentence Extraction</text>
  <text x="155" y="234" text-anchor="middle" fill="#7a6b52" font-size="10">noise removal, decomposition</text>

  <line x1="155" y1="245" x2="155" y2="271" stroke="#cc8800" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Type Classification -->
  <rect x="30" y="276" width="250" height="60" rx="3" fill="rgba(204,136,0,0.08)" stroke="#7a6b52" stroke-width="1"/>
  <text x="155" y="303" text-anchor="middle" fill="#e8d4b0" font-size="13">Type Classification</text>
  <text x="155" y="325" text-anchor="middle" fill="#7a6b52" font-size="10">fact | correction | preference | req</text>

  <line x1="155" y1="336" x2="155" y2="362" stroke="#cc8800" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Correction Detection -->
  <rect x="30" y="367" width="250" height="70" rx="3" fill="rgba(255,204,0,0.06)" stroke="#cc8800" stroke-width="1.5"/>
  <text x="155" y="394" text-anchor="middle" fill="#e8d4b0" font-size="13">Correction Detection</text>
  <text x="155" y="414" text-anchor="middle" fill="#ffcc00" font-size="11">92% accuracy, zero-LLM</text>
  <text x="155" y="430" text-anchor="middle" fill="#7a6b52" font-size="10">multi-signal heuristic</text>

  <line x1="155" y1="437" x2="155" y2="463" stroke="#cc8800" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LLM Classifier -->
  <rect x="30" y="468" width="250" height="70" rx="3" fill="rgba(204,136,0,0.08)" stroke="#7a6b52" stroke-width="1"/>
  <text x="155" y="495" text-anchor="middle" fill="#e8d4b0" font-size="13">LLM Classifier</text>
  <text x="155" y="515" text-anchor="middle" fill="#cc8800" font-size="11">Haiku, 99% accuracy</text>
  <text x="155" y="531" text-anchor="middle" fill="#7a6b52" font-size="10">~$0.005/session</text>

  <line x1="155" y1="538" x2="155" y2="564" stroke="#cc8800" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Bayesian Prior -->
  <rect x="30" y="569" width="250" height="56" rx="3" fill="rgba(204,136,0,0.08)" stroke="#7a6b52" stroke-width="1"/>
  <text x="155" y="596" text-anchor="middle" fill="#e8d4b0" font-size="13">Bayesian Prior</text>
  <text x="155" y="616" text-anchor="middle" fill="#7a6b52" font-size="10">type-dependent starting confidence</text>

  <line x1="155" y1="625" x2="155" y2="651" stroke="#cc8800" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Triple Extraction -->
  <rect x="30" y="656" width="250" height="70" rx="3" fill="rgba(204,136,0,0.08)" stroke="#7a6b52" stroke-width="1"/>
  <text x="155" y="683" text-anchor="middle" fill="#e8d4b0" font-size="13">Triple Extraction</text>
  <text x="155" y="703" text-anchor="middle" fill="#cc8800" font-size="11">41 regex patterns</text>
  <text x="155" y="719" text-anchor="middle" fill="#7a6b52" font-size="10">(entity, property, value, serial)</text>

  <line x1="155" y1="726" x2="155" y2="752" stroke="#cc8800" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Relationship Detector -->
  <rect x="30" y="757" width="250" height="56" rx="3" fill="rgba(204,136,0,0.08)" stroke="#7a6b52" stroke-width="1"/>
  <text x="155" y="783" text-anchor="middle" fill="#e8d4b0" font-size="13">Relationship Detector</text>
  <text x="155" y="804" text-anchor="middle" fill="#7a6b52" font-size="10">CONTRADICTS | SUPPORTS | SUPERSEDES</text>

  <line x1="155" y1="813" x2="155" y2="839" stroke="#cc8800" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SQLite Store -->
  <rect x="30" y="844" width="250" height="85" rx="3" fill="rgba(255,204,0,0.06)" stroke="#ffcc00" stroke-width="1.5"/>
  <text x="155" y="872" text-anchor="middle" fill="#ffcc00" font-size="14" filter="url(#glow-amber)">SQLite Store</text>
  <text x="155" y="894" text-anchor="middle" fill="#e8d4b0" font-size="10">beliefs  observations  edges</text>
  <text x="155" y="910" text-anchor="middle" fill="#e8d4b0" font-size="10">graph_edges  sessions  FTS5</text>
  <text x="155" y="924" text-anchor="middle" fill="#7a6b52" font-size="9">WAL mode | per-project isolation</text>

  <!-- ============ RETRIEVAL COLUMN ============ -->

  <!-- Query -->
  <rect x="325" y="110" width="250" height="44" rx="3" fill="none" stroke="#ffcc00" stroke-width="1.5"/>
  <text x="450" y="138" text-anchor="middle" fill="#ffcc00" font-size="13">Query</text>

  <line x1="450" y1="154" x2="450" y2="175" stroke="#cc8800" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- L0 -->
  <rect x="325" y="180" width="250" height="54" rx="3" fill="rgba(255,51,0,0.06)" stroke="#ff3300" stroke-width="1.5"/>
  <text x="345" y="205" fill="#ff3300" font-size="12" font-weight="bold">L0</text>
  <text x="380" y="205" fill="#e8d4b0" font-size="12">Locked Beliefs</text>
  <text x="450" y="225" text-anchor="middle" fill="#7a6b52" font-size="10">non-negotiable, always included</text>

  <line x1="450" y1="234" x2="450" y2="255" stroke="#cc8800" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- L1 -->
  <rect x="325" y="260" width="250" height="54" rx="3" fill="rgba(204,136,0,0.08)" stroke="#7a6b52" stroke-width="1"/>
  <text x="345" y="285" fill="#cc8800" font-size="12" font-weight="bold">L1</text>
  <text x="380" y="285" fill="#e8d4b0" font-size="12">Behavioral</text>
  <text x="450" y="305" text-anchor="middle" fill="#7a6b52" font-size="10">user rules, preferences</text>

  <line x1="450" y1="314" x2="450" y2="335" stroke="#cc8800" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- L2 -->
  <rect x="325" y="340" width="250" height="64" rx="3" fill="rgba(204,136,0,0.08)" stroke="#7a6b52" stroke-width="1"/>
  <text x="345" y="367" fill="#cc8800" font-size="12" font-weight="bold">L2</text>
  <text x="380" y="367" fill="#e8d4b0" font-size="12">FTS5 Search</text>
  <text x="450" y="387" text-anchor="middle" fill="#7a6b52" font-size="10">BM25 ranking, top_k=50</text>
  <text x="450" y="400" text-anchor="middle" fill="#7a6b52" font-size="9">covers 69% of directives</text>

  <line x1="450" y1="404" x2="450" y2="425" stroke="#cc8800" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- L2.5 -->
  <rect x="325" y="430" width="250" height="72" rx="3" fill="rgba(255,204,0,0.06)" stroke="#cc8800" stroke-width="1.5"/>
  <text x="345" y="457" fill="#ffcc00" font-size="12" font-weight="bold">L2.5</text>
  <text x="393" y="457" fill="#e8d4b0" font-size="12">Entity-Index</text>
  <text x="450" y="477" text-anchor="middle" fill="#cc8800" font-size="10">structured triples, 4-hop chaining</text>
  <text x="450" y="493" text-anchor="middle" fill="#7a6b52" font-size="9">41 patterns, 100% extraction</text>

  <line x1="450" y1="502" x2="450" y2="523" stroke="#cc8800" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- L3 -->
  <rect x="325" y="528" width="250" height="64" rx="3" fill="rgba(204,136,0,0.08)" stroke="#7a6b52" stroke-width="1"/>
  <text x="345" y="555" fill="#cc8800" font-size="12" font-weight="bold">L3</text>
  <text x="380" y="555" fill="#e8d4b0" font-size="12">HRR + BFS</text>
  <text x="450" y="575" text-anchor="middle" fill="#7a6b52" font-size="10">vocabulary bridge, 99.5% recovery</text>
  <text x="450" y="588" text-anchor="middle" fill="#7a6b52" font-size="9">edge-weighted graph, depth 2</text>

  <line x1="450" y1="592" x2="450" y2="613" stroke="#cc8800" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Merge -->
  <rect x="325" y="618" width="250" height="44" rx="3" fill="rgba(204,136,0,0.04)" stroke="#7a6b52" stroke-width="0.75"/>
  <text x="450" y="646" text-anchor="middle" fill="#e8d4b0" font-size="12">Merge + Deduplicate</text>

  <line x1="450" y1="662" x2="450" y2="683" stroke="#cc8800" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Score -->
  <rect x="325" y="688" width="250" height="70" rx="3" fill="rgba(255,204,0,0.06)" stroke="#cc8800" stroke-width="1"/>
  <text x="450" y="713" text-anchor="middle" fill="#e8d4b0" font-size="13">Score + Rank</text>
  <text x="450" y="733" text-anchor="middle" fill="#7a6b52" font-size="9">confidence x type_weight x decay</text>
  <text x="450" y="748" text-anchor="middle" fill="#7a6b52" font-size="9">x lock_boost x recency x thompson</text>

  <line x1="450" y1="758" x2="450" y2="779" stroke="#cc8800" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Compress -->
  <rect x="325" y="784" width="250" height="54" rx="3" fill="rgba(204,136,0,0.08)" stroke="#7a6b52" stroke-width="1"/>
  <text x="450" y="809" text-anchor="middle" fill="#e8d4b0" font-size="13">Compress + Pack</text>
  <text x="450" y="829" text-anchor="middle" fill="#7a6b52" font-size="10">55% savings, zero loss</text>

  <line x1="450" y1="838" x2="450" y2="859" stroke="#cc8800" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="325" y="864" width="250" height="65" rx="3" fill="none" stroke="#ffcc00" stroke-width="1.5"/>
  <text x="450" y="893" text-anchor="middle" fill="#ffcc00" font-size="14" filter="url(#glow-amber)">Ranked Belief List</text>
  <text x="450" y="915" text-anchor="middle" fill="#e8d4b0" font-size="10">token budget: 2000 | 0.7s avg</text>

  <!-- Connection: SQLite -> Retrieval -->
  <path d="M 280 886 Q 305 886, 305 400 Q 305 200, 325 200" fill="none" stroke="#7a6b52" stroke-width="0.75" stroke-dasharray="4,6"/>
  <text x="296" y="550" fill="#7a6b52" font-size="13" transform="rotate(-90 296 550)">reads from store</text>

  <!-- ============ FEEDBACK COLUMN ============ -->

  <!-- Agent Action -->
  <rect x="620" y="110" width="250" height="44" rx="3" fill="none" stroke="#ffcc00" stroke-width="1.5"/>
  <text x="745" y="138" text-anchor="middle" fill="#ffcc00" font-size="13">Agent Uses Beliefs</text>

  <line x1="745" y1="154" x2="745" y2="200" stroke="#cc8800" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Outcome Detection -->
  <rect x="620" y="205" width="250" height="100" rx="3" fill="rgba(204,136,0,0.08)" stroke="#7a6b52" stroke-width="1"/>
  <text x="745" y="232" text-anchor="middle" fill="#e8d4b0" font-size="13">Outcome Detection</text>
  <line x1="640" y1="242" x2="850" y2="242" stroke="#7a6b52" stroke-width="0.5"/>
  <text x="660" y="264" fill="#cc8800" font-size="11">used</text>
  <text x="720" y="264" fill="#7a6b52" font-size="10">belief followed</text>
  <text x="660" y="282" fill="#cc8800" font-size="11">ignored</text>
  <text x="730" y="282" fill="#7a6b52" font-size="10">no signal</text>
  <text x="660" y="300" fill="#ff3300" font-size="11">harmful</text>
  <text x="730" y="300" fill="#7a6b52" font-size="10">user corrected</text>

  <line x1="745" y1="305" x2="745" y2="345" stroke="#cc8800" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Bayesian Update -->
  <rect x="620" y="350" width="250" height="95" rx="3" fill="rgba(255,204,0,0.06)" stroke="#cc8800" stroke-width="1"/>
  <text x="745" y="377" text-anchor="middle" fill="#e8d4b0" font-size="13">Bayesian Update</text>
  <text x="745" y="397" text-anchor="middle" fill="#7a6b52" font-size="10">Beta-Bernoulli conjugate pairs</text>
  <line x1="640" y1="407" x2="850" y2="407" stroke="#7a6b52" stroke-width="0.5"/>
  <text x="660" y="428" fill="#e8d4b0" font-size="10">used    -> alpha + 1</text>
  <text x="660" y="443" fill="#e8d4b0" font-size="10">harmful -> beta + 1</text>

  <line x1="745" y1="445" x2="745" y2="490" stroke="#cc8800" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Thompson Sampling -->
  <rect x="620" y="495" width="250" height="70" rx="3" fill="rgba(204,136,0,0.08)" stroke="#7a6b52" stroke-width="1"/>
  <text x="745" y="524" text-anchor="middle" fill="#e8d4b0" font-size="13">Thompson Sampling</text>
  <text x="745" y="544" text-anchor="middle" fill="#7a6b52" font-size="10">explore uncertain beliefs</text>
  <text x="745" y="558" text-anchor="middle" fill="#7a6b52" font-size="9">calibrated: ECE 0.066</text>

  <line x1="745" y1="565" x2="745" y2="610" stroke="#cc8800" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Temporal Decay -->
  <rect x="620" y="615" width="250" height="70" rx="3" fill="rgba(204,136,0,0.08)" stroke="#7a6b52" stroke-width="1"/>
  <text x="745" y="644" text-anchor="middle" fill="#e8d4b0" font-size="13">Temporal Decay</text>
  <text x="745" y="664" text-anchor="middle" fill="#7a6b52" font-size="10">type-aware half-lives</text>
  <text x="745" y="678" text-anchor="middle" fill="#7a6b52" font-size="9">corrections never decay</text>

  <line x1="745" y1="685" x2="745" y2="730" stroke="#cc8800" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Confidence Update -->
  <rect x="620" y="735" width="250" height="60" rx="3" fill="rgba(255,204,0,0.06)" stroke="#cc8800" stroke-width="1"/>
  <text x="745" y="762" text-anchor="middle" fill="#e8d4b0" font-size="13">Confidence Adjusted</text>
  <text x="745" y="784" text-anchor="middle" fill="#ffcc00" font-size="11">+22% MRR over 10 rounds</text>

  <!-- Feedback loop arrow back to store -->
  <path d="M 745 795 L 745 950 C 745 1000, 450 1020, 280 930" fill="none" stroke="#ffcc00" stroke-width="1.5" stroke-dasharray="5,5" marker-end="url(#arrow-amber)"/>
  <text x="520" y="1010" text-anchor="middle" fill="#ffcc00" font-size="10">updates stored beliefs</text>

  <!-- Footer -->
  <line x1="40" y1="1060" x2="860" y2="1060" stroke="#7a6b52" stroke-width="0.5"/>
  <text x="450" y="1080" text-anchor="middle" fill="#7a6b52" font-size="9">agentmemory v1.2.1 | 18 modules | 19 MCP tools | MIT license</text>
</svg>