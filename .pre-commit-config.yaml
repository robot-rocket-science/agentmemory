# See https://pre-commit.com for more information
# Run: uv run pre-commit install && uv run pre-commit install --hook-type commit-msg
# Update hooks: uv run pre-commit autoupdate

repos:
  # --- Housekeeping ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: detect-private-key

  # --- Linting (ruff check only, no auto-format) ---
  # ruff-format removed from pre-commit: 1,200:1 noise-to-signal ratio.
  # Formatting caused ~12,000 lines of churn per session while catching zero bugs.
  # Run `uv run ruff format .` manually before releases instead.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]

  # --- Type checking (pyright, staged files only) ---
  - repo: local
    hooks:
      - id: pyright
        name: pyright strict type check
        entry: uv run pyright
        language: system
        types: [python]
        pass_filenames: true

  # --- Secret scanning ---
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks

  # --- Commit message format ---
  - repo: local
    hooks:
      - id: commit-msg-prefix
        name: enforce commit message prefix
        entry: python3 scripts/check-commit-msg.py
        language: system
        stages: [commit-msg]
        always_run: true
        pass_filenames: true
